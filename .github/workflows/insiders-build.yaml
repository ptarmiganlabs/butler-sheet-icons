name: insiders-build

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}

jobs:
  insiders-build:
    permissions:
      contents: read
      actions: write
      security-events: write
    strategy:
      matrix:
        target: [win, mac, linux]
        include:
          - target: win
            runs_on:
              - self-hosted
              - x64
              - windows
              - sp53
              - win-code-sign
            artifact_insider: butler-sheet-icons--win-x64--${{ github.sha }}.zip
          - target: mac
            runs_on:
              - self-hosted
              - macos
              - arm64
              - mac-build2
              - sp53
            artifact_insider: butler-sheet-icons--macos-arm64--${{ github.sha }}.zip
          - target: linux
            runs_on:
              - ubuntu-latest
            artifact_insider: butler-sheet-icons--linux-x64--${{ github.sha }}.tgz
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          pwd 
          npm ci --include=prod

      - name: Run Snyk to check for vulnerabilities
        if: |
          github.repository_owner == 'ptarmiganlabs' &&
          matrix.target == 'linux'
        uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=./package.json --sarif-file-output=snyk.sarif

      - name: Upload Snyk result to GitHub Code Scanning
        continue-on-error: true
        if: |
          github.repository_owner == 'ptarmiganlabs' &&
          matrix.target == 'linux'
        uses: github/codeql-action/upload-sarif@c3d42c5d08633d8b33635fbd94b000a0e2585b3c # v3
        with:
          sarif_file: snyk.sarif

      - name: Create binaries (Windows)
        if: matrix.target == 'win'
        env:
          DIST_FILE_NAME: butler-sheet-icons
          GITHUB_TOKEN: ${{ secrets.PAT }}
          CODESIGN_WIN_THUMBPRINT: ${{ secrets.WIN_CODESIGN_THUMBPRINT}}
        run: ./scripts/insider-build-win.ps1

      - name: Create binaries (macOS)
        if: matrix.target == 'mac'
        env:
          DIST_FILE_NAME: butler-sheet-icons
          GITHUB_TOKEN: ${{ secrets.PAT }}
          MACOS_CERTIFICATE: ${{ secrets.PROD_MACOS_CERTIFICATE_BASE64_CODESIGN }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.PROD_MACOS_CERTIFICATE_CODESIGN_PWD }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.PROD_MACOS_CERTIFICATE_CODESIGN_NAME }}
          MACOS_CI_KEYCHAIN_PWD: ${{ secrets.PROD_MACOS_CI_KEYCHAIN_PWD }}
          PROD_MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_APPLE_ID }}
          PROD_MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_TEAM_ID }}
          PROD_MACOS_NOTARIZATION_PWD: ${{ secrets.PROD_MACOS_NOTARIZATION_PWD }}
        run: bash ./scripts/insider-build-mac.sh

      - name: Create binaries (Linux)
        if: matrix.target == 'linux'
        env:
          DIST_FILE_NAME: butler-sheet-icons
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: bash ./scripts/insider-build-linux.sh

      - name: Generate SBOM (linux only)
        if: matrix.target == 'linux'
        env:
          DIST_FILE_NAME: butler-sheet-icons
          SBOM_TOOL_VERSION: v4.0.2
        run: |
          curl -Lo $RUNNER_TEMP/sbom-tool "https://github.com/microsoft/sbom-tool/releases/download/${SBOM_TOOL_VERSION}/sbom-tool-linux-x64"
          chmod +x $RUNNER_TEMP/sbom-tool

          mkdir -p ./build/sbom
          VERSION=$(node -p "require('./package.json').version")
          $RUNNER_TEMP/sbom-tool generate \
            -b ./build/sbom \
            -bc . \
            -pn ${DIST_FILE_NAME} \
            -pv ${VERSION} \
            -ps "Ptarmigan Labs" \
            -nsb https://sbom.ptarmiganlabs.com \
            -V verbose

      - name: Upload SBOM artifact
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-insiders-${{ github.sha }}
          path: ./build/sbom/

      - name: Upload insider build artifacts to GitHub
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact_insider }}
          path: ${{ matrix.artifact_insider }}
